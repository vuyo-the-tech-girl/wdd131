<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scaled=1.0">
        <meta name="description" content="Home page.">
        <meta name="author" content="Vuyo Faleni">
        <title>Spritz</title>
        <link rel="stylesheet" href="styles/siteplan.css">
        <script src="scripts/project.js" defer></script>
    </head>
    <body>
        <header>
            <nav>
                <button id="theme-toggle">Dark Mode</button>
                <ul>
                    <li><a href="https://vuyo-the-tech-girl.github.io/wdd131/project/index.html">Home</a></li>
                    <li><a href="https://vuyo-the-tech-girl.github.io/wdd131/project/about.html">About Us</a></li>
                    <li><a href="https://vuyo-the-tech-girl.github.io/wdd131/project/contact.html">Contact</a></li>
                    <li><a href="https://vuyo-the-tech-girl.github.io/wdd131/project/booking.html">Bookings</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="hero">
                <img src="images/logo.jpg" alt="Perfume Logo">
                <p id="greeting"></p>
                <h1>Experience The Beauty of Perfume Making.</h1>
            </section>
            <section class="class">
                <h2>Stay Updated!</h2>
                <form>
                    <p id="form-message"></p>
                    <input type="text" name="name" placeholder="Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <button type="submit">Sign Up</button>
                </form>
            </section>
            <section class="grid-container">
                <div class="grid-item">
                    <img src="images/perfume-collection.jpg" alt="Perfume Collection">
                    <p>Try out all the different perfumes we offer!</p>
                </div>
                <div class="grid-item">
                    <img src="images/perfume-making.jpg" alt="Scent Collection">
                    <p>Experiment with various kinds of scents.</p>
                    <button id="load-scents">Load Featured Scents</button>
                    <div id="scents-output"></div>
                </div>
            </section>
            <section class="call-to-action">
                <a href="https://vuyo-the-tech-girl.github.io/wdd131/project/booking.html" class="cta-button">Book a Class!</a>
            </section>
        </main>
        <footer>
        <p>&copy; <span id="year"></span> Spritz 🌺 Vuyo Faleni 🌺</p>
    </footer>
    </body>
</html>
