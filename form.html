<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Creating a html file for a Product Review Form. Week 5 assignment.">
    <meta name="author" content="Vuyo Faleni">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>
    <main>
        <form id="review-form" method="get" action="review.html">
            <label for="product-name">Product Name:</label>
            <select id="product-name" name="product-name" required>
                <option value="" disabled selected>Select a Product</option>
            </select>
            <br><br>
            <label>Overall Rating:</label>
            <div id="rating">
                <input type="radio" id="rating-1" name="rating" value="1" required>
                <label for="rating-1">⭐</label>
                <input type="radio" id="rating-2" name="rating" value="2" required>
                <label for="rating-2">⭐⭐</label>
                <input type="radio" id="rating-3" name="rating" value="3" required>
                <label for="rating-3">⭐⭐⭐</label>
                <input type="radio" id="rating-4" name="rating" value="4" required>
                <label for="rating-4">⭐⭐⭐⭐</label>
                <input type="radio" id="rating-5" name="rating" value="5" required>
                <label for="rating-5">⭐⭐⭐⭐⭐</label>
            </div>
            <br><br>
            <label for="installation-date">Date of Installation:</label>
            <input type="date" id="installation-date" name="installation-date" required>
            <br><br>
            <label>Which features did you find useful in the product?:</label>
            <div id="features">
               <input type="checkbox" id="feature-1" name="features" value="Feature 1">
               <label for="feature-1">Durability</label> 
               <input type="checkbox" id="feature-2" name="features" value="Feature 2">
               <label for="feature-2">Easy to Use</label> 
               <input type="checkbox" id="feature-3" name="features" value="Feature 3">
               <label for="feature-3">Performance</label> 
               <input type="checkbox" id="feature-4" name="features" value="Feature 4">
               <label for="feature-4">Design</label> 
            </div>
            <br><br>
            <label for="review">Written Review:</label>
            <textarea id="review" name="review"></textarea>
            <br><br>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username">
            <br><br>
            <input type="submit" value="Submit Review">
        </form>
    </main>
    <footer>
        <p>&copy; 2026 🌺 Vuyo Faleni 🌺 South Africa</p>
    </footer>
    
</body>
</html>
